            'img2/masseria-schiuma_farmhouse_puglia-italy_interior-table-chairs-1729826060573.jpg',
            'img2/masseria-schiuma_farmhouse_puglia-italy_interior-table-design-1729826061475.jpg',
            'img2/masseria-schiuma_farmhouse_puglia-italy_interior-table-terrace-1729826061375.jpg',
            'img2/masseria-schiuma_farmhouse_puglia-italy_interior-windows-1729826060764.jpg'
        ];

        const galleryGrid = document.getElementById('gallery-grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let currentIndex = 0;

        imageFiles.forEach((src, index) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';

            const img = new Image();
            img.src = src;
            img.alt = "Masseria Schiuma Gallery Image";

            img.onload = () => {
                const aspectRatio = img.naturalWidth / img.naturalHeight;
                if (aspectRatio > 1.4) {
                    item.classList.add('wide');
                } else if (aspectRatio < 0.8) {
                    item.classList.add('tall');
                } else {
                    if (Math.random() > 0.7) item.classList.add('large');
                }
                item.appendChild(img);
                galleryGrid.appendChild(item);
            };

            item.addEventListener('click', () => {
                currentIndex = index;
                updateLightboxImage();
                lightbox.classList.add('active');
            });
        });

        function updateLightboxImage() { lightboxImg.src = imageFiles[currentIndex]; }
        function closeLightbox() { lightbox.classList.remove('active'); }
        function nextImage() { currentIndex = (currentIndex + 1) % imageFiles.length; updateLightboxImage(); }
        function prevImage() { currentIndex = (currentIndex - 1 + imageFiles.length) % imageFiles.length; updateLightboxImage(); }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-next').addEventListener('click', nextImage);
        document.getElementById('lightbox-prev').addEventListener('click', prevImage);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger');
            const drawer = document.getElementById('mobile-drawer');

            if (hamburger && drawer) {
                // We use an onclick function here to guarantee it registers
                hamburger.onclick = function() {
                    hamburger.classList.toggle('active');
                    drawer.classList.toggle('active');
                    // Stops the background from scrolling when menu is open
                    document.body.style.overflow = drawer.classList.contains('active') ? 'hidden' : '';
                };
            }
        });
    </script>
